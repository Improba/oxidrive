# =============================================================================
# oxidrive example configuration
# =============================================================================
# Copy this file to `config.toml` (or `config.json`) in the directory from which
# you run `oxidrive`, or pass `--config /path/to/file.toml` explicitly.
#
# Resolution order when `--config` is omitted:
#   1. ./config.toml
#   2. ./config.json
#
# Parsing: TOML is tried first for each file; if that fails, JSON is attempted.

# -----------------------------------------------------------------------------
# OAuth (required for setup/sync)
# -----------------------------------------------------------------------------
# Google OAuth Desktop client credentials from Google Cloud Console.
client_id = ""
client_secret = ""

# Path to persisted OAuth token JSON (created by `oxidrive setup`).
token_path = "token.json"

# -----------------------------------------------------------------------------
# Sync root (required in practice)
# -----------------------------------------------------------------------------
# Directory on disk that mirrors your Google Drive folder. Use an absolute path
# in production to avoid surprises when the working directory changes.
sync_dir = "/home/you/DriveSync"

# -----------------------------------------------------------------------------
# Drive scope
# -----------------------------------------------------------------------------
# Required folder id from the Google Drive URL (last path segment).
# Sync will fail fast when this value is missing.
drive_folder_id = "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgvE2upms"

# -----------------------------------------------------------------------------
# Timing
# -----------------------------------------------------------------------------
# How often the background service (`oxidrive service`) should trigger a sync (seconds).
sync_interval_secs = 300

# How long filesystem events are coalesced before a sync is scheduled (milliseconds).
debounce_ms = 2000

# -----------------------------------------------------------------------------
# Conflicts
# -----------------------------------------------------------------------------
# How edit/edit conflicts are resolved. The default is the non-destructive
# "conflict_copy" policy (keeps both sides, like Dropbox), which is recommended
# for folders shared between several devices/people.
# One of: "conflict_copy" (default), "local_wins", "remote_wins",
# or a rename policy (inline table).
# conflict_policy = "local_wins"
# conflict_policy = "remote_wins"
# conflict_policy = { rename = { suffix = "_remote" } }
conflict_policy = "conflict_copy"

# -----------------------------------------------------------------------------
# Parallel HTTP
# -----------------------------------------------------------------------------
max_concurrent_uploads = 4
max_concurrent_downloads = 4

# -----------------------------------------------------------------------------
# Ignore rules
# -----------------------------------------------------------------------------
# Glob patterns understood by the scanner: literal names, `*` / `?` wildcards
# (matched per path segment, e.g. `~$*`, `.~lock.*#`, `*.tmp`) and `prefix/**`
# directory trees. A set of mandatory internal exclusions (`.oxidrive/**`,
# `.index/**`, `.trash/**`, common editor/office lock + temp files) is always
# applied on top of this list, so you only need to add project-specific rules.
ignore_patterns = [
  ".DS_Store",
  "*.tmp",
  ".oxidrive/**",
]

# -----------------------------------------------------------------------------
# Multi-device safety (shared folders)
# -----------------------------------------------------------------------------
# Stable identity for this device; auto-generated and persisted if omitted.
# device_id = "laptop-3f9a2c"

# Route local deletions through a confirmation flow + local .trash/ instead of
# deleting immediately. Strongly recommended for shared folders.
safe_delete = true

# Minimum age (ms) a file must reach since its last change before it is eligible
# for upload. Avoids syncing files that are still being written/open.
stability_ms = 1500

# Retention (days) for files moved to .trash/ before they are permanently purged.
trash_ttl_days = 30

# Enable best-effort advisory leases (signals when another device is editing a
# file). Off by default; this is advisory only and not a hard lock.
use_leases = false

# -----------------------------------------------------------------------------
# Indexing (optional)
# -----------------------------------------------------------------------------
# If set, Markdown / search index output can be written under this directory.
# index_dir = "/home/you/.cache/oxidrive/index"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
# Default filter when `RUST_LOG` is unset. CLI `--verbose` / `--quiet` still
# influence tracing setup; CLI flags take priority over this value.
log_level = "info"
# Optional: JSON lines to a daily-rotating file (parent directory is created if needed).
# log_file = "/var/log/oxidrive/oxidrive.log"
