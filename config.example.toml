# =============================================================================
# oxidrive example configuration
# =============================================================================
# Copy this file to `config.toml` (or `config.json`) in the directory from which
# you run `oxidrive`, or pass `--config /path/to/file.toml` explicitly.
#
# Resolution order when `--config` is omitted:
#   1. ./config.toml
#   2. ./config.json
#
# Parsing: TOML is tried first for each file; if that fails, JSON is attempted.

# -----------------------------------------------------------------------------
# OAuth (required for setup/sync)
# -----------------------------------------------------------------------------
# Google OAuth Desktop client credentials from Google Cloud Console.
client_id = ""
client_secret = ""

# Path to persisted OAuth token JSON (created by `oxidrive setup`).
token_path = "token.json"

# -----------------------------------------------------------------------------
# Sync root (required in practice)
# -----------------------------------------------------------------------------
# Directory on disk that mirrors your Google Drive folder. Use an absolute path
# in production to avoid surprises when the working directory changes.
sync_dir = "/home/you/DriveSync"

# -----------------------------------------------------------------------------
# Drive scope
# -----------------------------------------------------------------------------
# Optional folder id from the Google Drive URL (last path segment). When set,
# listing and sync can be limited to that folder tree.
# drive_folder_id = "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgvE2upms"

# -----------------------------------------------------------------------------
# Timing
# -----------------------------------------------------------------------------
# How often the background service (`oxidrive service`) should trigger a sync (seconds).
sync_interval_secs = 300

# How long filesystem events are coalesced before a sync is scheduled (milliseconds).
debounce_ms = 2000

# -----------------------------------------------------------------------------
# Conflicts
# -----------------------------------------------------------------------------
# One of: "local_wins", "remote_wins", or a rename policy (inline table).
# conflict_policy = "local_wins"
# conflict_policy = "remote_wins"
# conflict_policy = { rename = { suffix = "_remote" } }
conflict_policy = "local_wins"

# -----------------------------------------------------------------------------
# Parallel HTTP
# -----------------------------------------------------------------------------
max_concurrent_uploads = 4
max_concurrent_downloads = 4

# -----------------------------------------------------------------------------
# Ignore rules
# -----------------------------------------------------------------------------
# Simple patterns understood by the scanner: literal names, `*.ext` suffixes,
# `prefix/**` directory trees, etc. Adjust to match your workflow.
ignore_patterns = [
  ".DS_Store",
  "*.tmp",
  ".oxidrive/**",
]

# -----------------------------------------------------------------------------
# Indexing (optional)
# -----------------------------------------------------------------------------
# If set, Markdown / search index output can be written under this directory.
# index_dir = "/home/you/.cache/oxidrive/index"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
# Default filter when `RUST_LOG` is unset. CLI `--verbose` / `--quiet` still
# influence tracing setup; CLI flags take priority over this value.
log_level = "info"
# Optional: JSON lines to a daily-rotating file (parent directory is created if needed).
# log_file = "/var/log/oxidrive/oxidrive.log"
